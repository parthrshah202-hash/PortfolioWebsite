<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Central pipeline connection track forming the letter 'P' -->
  <path
    d="M 10 24 V 8 H 22 V 16 H 10"
    stroke="#AC5029"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Data Node (Blue) at (10, 24) -->
  <circle cx="10" cy="24" r="3.5" fill="#2563eb" stroke="#ffffff" stroke-width="1.2" />

  <!-- Pipeline Node (Emerald) at (10, 8) -->
  <circle cx="10" cy="8" r="3.5" fill="#059669" stroke="#ffffff" stroke-width="1.2" />

  <!-- Model Node (Purple) at (22, 8) -->
  <circle cx="22" cy="8" r="3.5" fill="#7c3aed" stroke="#ffffff" stroke-width="1.2" />

  <!-- Insight Node (Orange) at (22, 16) -->
  <circle cx="22" cy="16" r="3.5" fill="#ac5029" stroke="#ffffff" stroke-width="1.2" />
</svg>
